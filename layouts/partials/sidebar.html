<style>
    .sidebar { width: 240px; flex-shrink: 0; }
    .sidebar-section { background: white; border-radius: 8px; padding: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 1rem; }
    .sidebar-section h3 { color: #667eea; font-size: 1rem; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 2px solid #f0f0ff; }
    .sidebar-section h3 a { color: #667eea; text-decoration: none; }
    .sidebar-section h3 a:hover { text-decoration: underline; }
    .sidebar-links { display: flex; flex-direction: column; gap: 0.35rem; }
    .sidebar-links a { display: inline-block; padding: 0.3rem 0.7rem; border-radius: 16px; font-size: 0.85rem; text-decoration: none; color: #555; background: #f5f5f5; transition: all 0.2s; }
    .sidebar-links a:hover { background: #667eea; color: white; }
    .sidebar-links a.active { background: #667eea; color: white; }
</style>
<aside class="sidebar">
    {{ range where .Site.Pages "Kind" "section" }}
    <div class="sidebar-section">
        <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
        <div class="sidebar-links">
            {{ if isset $.Site.Params.section_subcategories .Title }}
            {{ range index $.Site.Params.section_subcategories .Title }}
            <a href="{{ printf "/subcategories/%s/" (urlize .) }}">{{ . }}</a>
            {{ end }}
            {{ end }}
        </div>
    </div>
    {{ end }}
</aside>
