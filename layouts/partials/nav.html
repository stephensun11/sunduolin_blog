<nav class="site-nav" aria-label="main navigation">
    <div class="nav-inner">
        {{ range .Site.Menus.main }}
        {{ if .HasChildren }}
        <div class="nav-item">
            <a class="nav-link" href="{{ partial "internal-link.html" .URL }}">{{ .Name }} ▾</a>
            <div class="dropdown">
                {{ range .Children }}
                <a href="{{ partial "internal-link.html" .URL }}">{{ .Name }}</a>
                {{ end }}
            </div>
        </div>
        {{ else }}
        <div class="nav-item">
            <a class="nav-link" href="{{ partial "internal-link.html" .URL }}">{{ .Name }}</a>
        </div>
        {{ end }}
        {{ end }}
    </div>
</nav>
