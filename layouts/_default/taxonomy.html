<!DOCTYPE html>
<html lang="zh-CN">
{{ partial "head.html" . }}
<body>
    {{ partial "site-header.html" . }}
    {{ partial "nav.html" . }}
    <main class="site-shell">
        <div class="main-content">
            <header class="taxonomy-header">
                <h1>{{ .Title }}</h1>
                <p>Filtered notes from the knowledge base.</p>
            </header>
            <div class="post-list">
                {{ range .Pages }}
                {{ partial "post-card.html" . }}
                {{ else }}
                <div class="empty-hint">该分类暂无文章</div>
                {{ end }}
            </div>
        </div>
        {{ partial "sidebar.html" . }}
    </main>
    {{ partial "footer.html" . }}
</body>
</html>
