<!DOCTYPE html>
<html lang="zh-CN">
{{ partial "head.html" . }}
<body>
    {{ partial "site-header.html" . }}
    {{ partial "nav.html" . }}
    <main class="site-shell">
        <div class="main-content">
            <header class="taxonomy-header">
                <h1>{{ .Title }}</h1>
                <p>Browse by taxonomy term.</p>
            </header>
            <div class="terms-grid">
                {{ range .Data.Terms }}
                <article class="term-card">
                    <a href="{{ partial "internal-link.html" .Page.RelPermalink }}">{{ .Page.Title }}</a>
                    <div class="count">{{ .Count }} 篇文章</div>
                </article>
                {{ end }}
            </div>
        </div>
        {{ partial "sidebar.html" . }}
    </main>
    {{ partial "footer.html" . }}
</body>
</html>
