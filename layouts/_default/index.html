<!DOCTYPE html>
<html lang="zh-CN">
{{ partial "head.html" . }}
<body>
    {{ partial "site-header.html" . }}
    {{ partial "nav.html" . }}
    <main class="site-shell">
        <div class="main-content">
            <h2 class="recent-title">latest notes</h2>
            <div class="posts-grid">
                {{ range .Site.RegularPages }}
                {{ partial "post-card.html" . }}
                {{ end }}
            </div>
        </div>
        {{ partial "sidebar.html" . }}
    </main>
    {{ partial "footer.html" . }}
</body>
</html>
