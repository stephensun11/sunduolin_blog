<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 930" role="img" aria-labelledby="title desc">
  <title id="title">Llama 4 的原生多模态 MoE 架构</title>
  <desc id="desc">展示文本、图像和视频通过 Early Fusion 进入共享骨干，稠密层与 MoE 层交替，并说明共享专家、路由专家与 iRoPE。</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <style>
      .title{font:700 32px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#172033}.sub{font:400 17px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#526174}.h{font:700 22px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#172033}.label{font:700 16px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#172033}.txt{font:400 15px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#415166}.small{font:400 13px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748b}.card{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.blue{fill:#eff6ff;stroke:#2563eb;stroke-width:1.8}.green{fill:#ecfdf5;stroke:#0f766e;stroke-width:1.8}.amber{fill:#fffbeb;stroke:#b45309;stroke-width:1.8}.pink{fill:#fff1f2;stroke:#be123c;stroke-width:1.8}.line{fill:none;stroke:#64748b;stroke-width:2;marker-end:url(#arr)}
    </style>
  </defs>
  <rect width="1400" height="930" fill="#f7fafc"/>
  <text class="title" x="62" y="58">Llama 4：容量、计算量和模态第一次被统一设计</text>
  <text class="sub" x="62" y="90">Early Fusion 统一输入，MoE 解耦总参数与激活参数，iRoPE 让长上下文有更稳的外推路径</text>

  <rect class="card" x="58" y="135" width="1284" height="450" rx="6"/>
  <text class="h" x="84" y="178">从多模态输入到交替骨干</text>
  <rect class="blue" x="88" y="226" width="165" height="65" rx="6"/>
  <text class="label" x="171" y="254" text-anchor="middle">文本 tokens</text><text class="small" x="171" y="278" text-anchor="middle">Tokenizer</text>
  <rect class="pink" x="88" y="323" width="165" height="65" rx="6"/>
  <text class="label" x="171" y="351" text-anchor="middle">图像 patches</text><text class="small" x="171" y="375" text-anchor="middle">MetaCLIP 编码器</text>
  <rect class="pink" x="88" y="420" width="165" height="65" rx="6"/>
  <text class="label" x="171" y="448" text-anchor="middle">视频帧</text><text class="small" x="171" y="472" text-anchor="middle">视觉 token 序列</text>
  <path class="line" d="M253 258H350V355"/><path class="line" d="M253 355H350"/><path class="line" d="M253 452H350V355"/>
  <rect class="green" x="350" y="300" width="245" height="110" rx="6"/>
  <text class="label" x="473" y="334" text-anchor="middle">Early Fusion</text>
  <text class="txt" x="473" y="365" text-anchor="middle">交织成一个 token 流</text>
  <text class="small" x="473" y="391" text-anchor="middle">从预训练开始联合建模</text>
  <path class="line" d="M595 355H650"/>
  <rect class="blue" x="650" y="245" width="210" height="90" rx="6"/>
  <text class="label" x="755" y="278" text-anchor="middle">Dense Transformer</text><text class="small" x="755" y="305" text-anchor="middle">所有 token 共享参数</text>
  <path class="line" d="M755 335V380"/>
  <rect class="amber" x="650" y="380" width="210" height="90" rx="6"/>
  <text class="label" x="755" y="413" text-anchor="middle">MoE Transformer</text><text class="small" x="755" y="440" text-anchor="middle">共享专家 + Top-1 路由</text>
  <path class="line" d="M860 425H925"/>
  <rect class="green" x="925" y="300" width="360" height="110" rx="6"/>
  <text class="label" x="1105" y="334" text-anchor="middle">统一文本 / 视觉输出</text>
  <text class="txt" x="1105" y="365" text-anchor="middle">理解、定位、推理、代码与对话</text>
  <text class="small" x="1105" y="391" text-anchor="middle">稠密层与 MoE 层在网络中交替</text>
  <text class="small" x="661" y="518">Maverick：400B 总参数，但每个 token 约激活 17B；总容量大，单 token 计算仍可控。</text>

  <rect class="card" x="58" y="625" width="390" height="245" rx="6"/>
  <text class="h" x="84" y="665">MoE 路由</text>
  <rect class="green" x="84" y="708" width="140" height="55" rx="6"/><text class="label" x="154" y="741" text-anchor="middle">共享专家</text>
  <text class="txt" x="245" y="741">每个 token 都经过</text>
  <rect class="amber" x="84" y="789" width="140" height="55" rx="6"/><text class="label" x="154" y="822" text-anchor="middle">路由专家</text>
  <text class="txt" x="245" y="813">从 16 或 128 个中</text><text class="txt" x="245" y="838">只选择 1 个</text>

  <rect class="card" x="505" y="625" width="390" height="245" rx="6"/>
  <text class="h" x="531" y="665">iRoPE 长上下文</text>
  <text class="txt" x="531" y="708">多数注意力层继续使用 RoPE，</text>
  <text class="txt" x="531" y="736">间隔插入不使用位置嵌入的层。</text>
  <text class="txt" x="531" y="776">再配合推理时 attention temperature</text>
  <text class="txt" x="531" y="804">scaling，改善训练长度之外的外推。</text>
  <rect class="blue" x="531" y="828" width="338" height="25" rx="6"/><text class="small" x="700" y="846" text-anchor="middle">Scout 官方标称最高 10M 输入上下文</text>

  <rect x="952" y="625" width="390" height="245" rx="6" fill="#fff" stroke="#0f766e" stroke-width="2"/>
  <text class="h" x="978" y="665">教师蒸馏</text>
  <text class="txt" x="978" y="708">Behemoth：近 2T 总参数、288B 激活，</text>
  <text class="txt" x="978" y="736">16 专家，作为尚未公开权重的教师。</text>
  <text class="txt" x="978" y="776">Scout 与 Maverick 在预训练期接受</text>
  <text class="txt" x="978" y="804">软目标和硬目标动态加权的协同蒸馏。</text>
  <rect class="green" x="978" y="828" width="338" height="25" rx="6"/><text class="small" x="1147" y="846" text-anchor="middle">把超大教师能力压入更易部署的学生</text>

  <text class="small" x="62" y="906">Llama 4 Scout 与 Maverick 已发布；Behemoth 在官方发布说明中仍是训练中的预览教师，三者状态不能混写。</text>
</svg>
