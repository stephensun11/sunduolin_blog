<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Qwen3-Next 与 Qwen3.5 混合架构</title>
  <desc id="desc">展示三个 Gated DeltaNet 线性注意力块与一个 Gated Attention 全注意力块的周期结构，以及高稀疏 MoE 和 Qwen3.5 的多模态输入。</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <style>
      .title{font:700 32px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#172033}.sub{font:400 17px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#526174}.h{font:700 22px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#172033}.label{font:700 16px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#172033}.txt{font:400 15px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#415166}.small{font:400 13px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748b}.formula{font:500 16px Consolas,'Microsoft YaHei',monospace;fill:#1e3a5f}.card{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.linear{fill:#ecfdf5;stroke:#0f766e;stroke-width:1.8}.full{fill:#eff6ff;stroke:#2563eb;stroke-width:1.8}.moe{fill:#fffbeb;stroke:#b45309;stroke-width:1.8}.vision{fill:#fff1f2;stroke:#be123c;stroke-width:1.8}.line{fill:none;stroke:#64748b;stroke-width:2;marker-end:url(#arr)}
    </style>
  </defs>
  <rect width="1400" height="920" fill="#f7fafc"/>
  <text class="title" x="62" y="58">Qwen3-Next：让大多数层线性扫描，让少数层精确回看</text>
  <text class="sub" x="62" y="90">线性注意力负责吞吐与固定状态，全注意力负责精确检索；每一层后面都接高稀疏 MoE</text>

  <rect class="card" x="58" y="135" width="1284" height="350" rx="6"/>
  <text class="h" x="84" y="178">一个四层周期，重复 12 次 = 48 层</text>
  <rect class="linear" x="88" y="225" width="220" height="95" rx="6"/>
  <text class="label" x="198" y="258" text-anchor="middle">Gated DeltaNet</text><text class="small" x="198" y="284" text-anchor="middle">线性递归状态 Sₜ</text><text class="small" x="198" y="305" text-anchor="middle">第 1 层</text>
  <path class="line" d="M308 272H350"/>
  <rect class="linear" x="350" y="225" width="220" height="95" rx="6"/>
  <text class="label" x="460" y="258" text-anchor="middle">Gated DeltaNet</text><text class="small" x="460" y="284" text-anchor="middle">选择性写入 / 擦除</text><text class="small" x="460" y="305" text-anchor="middle">第 2 层</text>
  <path class="line" d="M570 272H612"/>
  <rect class="linear" x="612" y="225" width="220" height="95" rx="6"/>
  <text class="label" x="722" y="258" text-anchor="middle">Gated DeltaNet</text><text class="small" x="722" y="284" text-anchor="middle">O(L) 扫描</text><text class="small" x="722" y="305" text-anchor="middle">第 3 层</text>
  <path class="line" d="M832 272H874"/>
  <rect class="full" x="874" y="225" width="220" height="95" rx="6"/>
  <text class="label" x="984" y="258" text-anchor="middle">Gated Attention</text><text class="small" x="984" y="284" text-anchor="middle">全局精确回看</text><text class="small" x="984" y="305" text-anchor="middle">第 4 层</text>
  <path class="line" d="M1094 272H1160"/>
  <rect class="full" x="1160" y="235" width="140" height="75" rx="6"/>
  <text class="label" x="1230" y="265" text-anchor="middle">× 12</text><text class="small" x="1230" y="290" text-anchor="middle">完整骨干</text>

  <rect class="moe" x="88" y="360" width="1006" height="78" rx="6"/>
  <text class="label" x="591" y="390" text-anchor="middle">每个注意力块后：High-Sparsity MoE</text>
  <text class="txt" x="591" y="418" text-anchor="middle">Qwen3-Next 80B-A3B：512 专家，10 个路由专家 + 1 个共享专家参与计算</text>
  <path class="line" d="M198 320V355"/><path class="line" d="M460 320V355"/><path class="line" d="M722 320V355"/><path class="line" d="M984 320V355"/>

  <rect class="card" x="58" y="525" width="610" height="330" rx="6"/>
  <text class="h" x="84" y="568">Gated DeltaNet 在做什么？</text>
  <text class="txt" x="84" y="606">它不保存所有历史 K/V，而是维护固定大小状态矩阵：</text>
  <text class="formula" x="84" y="642">Sₜ = αₜ ⊙ Sₜ₋₁ + βₜ · (vₜ - Sₜ₋₁kₜ)kₜᵀ</text>
  <text class="txt" x="84" y="678">其中衰减门 α 控制遗忘，Delta Rule 先擦掉旧绑定，</text>
  <text class="txt" x="84" y="706">再写入新的 key-value 关联。读取时用 qₜ 查询 Sₜ。</text>
  <text class="txt" x="84" y="746">优点：序列长度增长时，缓存不随 L 线性膨胀。</text>
  <text class="txt" x="84" y="774">代价：固定状态会压缩历史，不擅长逐字精确回忆。</text>
  <rect class="full" x="84" y="802" width="558" height="32" rx="6"/>
  <text class="small" x="363" y="824" text-anchor="middle">所以每四层保留一层全注意力，补回高保真检索路径</text>

  <rect x="725" y="525" width="617" height="330" rx="6" fill="#fff" stroke="#0f766e" stroke-width="2"/>
  <text class="h" x="751" y="568">Qwen3.5：在混合骨干前加入原生视觉</text>
  <rect class="vision" x="755" y="612" width="160" height="70" rx="6"/>
  <text class="label" x="835" y="641" text-anchor="middle">图像 / 视频</text><text class="small" x="835" y="666" text-anchor="middle">视觉编码器</text>
  <rect class="full" x="755" y="720" width="160" height="70" rx="6"/>
  <text class="label" x="835" y="749" text-anchor="middle">文本 tokens</text><text class="small" x="835" y="774" text-anchor="middle">共享词表与模板</text>
  <path class="line" d="M915 647H980V700"/><path class="line" d="M915 755H980V700"/>
  <rect class="linear" x="980" y="655" width="320" height="92" rx="6"/>
  <text class="label" x="1140" y="685" text-anchor="middle">Early Fusion Token Stream</text>
  <text class="txt" x="1140" y="713" text-anchor="middle">同一混合注意力 + MoE 骨干</text>
  <text class="small" x="1140" y="736" text-anchor="middle">从预训练起联合学习跨模态关系</text>
  <text class="txt" x="751" y="824">升级重点从“更省的语言模型”变成“统一的多模态智能体底座”。</text>

  <text class="small" x="62" y="890">说明：公式为 DeltaNet 机制的教学化表达，具体实现还包含卷积、归一化、分头参数与并行扫描等工程细节。</text>
</svg>
