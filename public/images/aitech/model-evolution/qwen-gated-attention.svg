<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Qwen Gated Attention 工作原理</title>
  <desc id="desc">展示标准注意力头输出如何经过查询相关的 Sigmoid 门控，并说明门控在注意力之后的位置和作用。</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <style>
      .title{font:700 32px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#172033}.sub{font:400 17px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#526174}.h{font:700 22px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#172033}.label{font:700 16px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#172033}.txt{font:400 15px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#415166}.small{font:400 13px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748b}.formula{font:500 17px Consolas,'Microsoft YaHei',monospace;fill:#1e3a5f}.card{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.blue{fill:#eff6ff;stroke:#2563eb;stroke-width:1.8}.green{fill:#ecfdf5;stroke:#0f766e;stroke-width:1.8}.amber{fill:#fffbeb;stroke:#b45309;stroke-width:1.8}.pink{fill:#fff1f2;stroke:#be123c;stroke-width:1.8}.line{fill:none;stroke:#64748b;stroke-width:2;marker-end:url(#arr)}
    </style>
  </defs>
  <rect width="1400" height="900" fill="#f7fafc"/>
  <text class="title" x="62" y="58">Gated Attention：注意力读完以后，再决定这次读取应写回多少</text>
  <text class="sub" x="62" y="90">门控位于 SDPA 输出之后、输出投影之前；它不会替代 softmax，也不是 MoE 路由器</text>

  <rect class="card" x="58" y="135" width="1284" height="390" rx="6"/>
  <text class="h" x="84" y="177">单个 token、单个 attention head 的数据流</text>
  <rect class="blue" x="84" y="225" width="155" height="70" rx="6"/>
  <text class="label" x="162" y="255" text-anchor="middle">当前状态 xₜ</text>
  <text class="small" x="162" y="279" text-anchor="middle">生成 Q / K / V</text>
  <path class="line" d="M239 260H300"/>
  <rect class="blue" x="300" y="210" width="250" height="100" rx="6"/>
  <text class="label" x="425" y="245" text-anchor="middle">Scaled Dot-Product Attention</text>
  <text class="formula" x="425" y="276" text-anchor="middle">oₜ,ₕ = Σₛ aₜ,ₛ,ₕ vₛ,ₕ</text>
  <path class="line" d="M550 260H625"/>
  <circle cx="682" cy="260" r="48" fill="#ecfdf5" stroke="#0f766e" stroke-width="2"/>
  <text class="label" x="682" y="254" text-anchor="middle">×</text>
  <text class="small" x="682" y="280" text-anchor="middle">逐头缩放</text>
  <path class="line" d="M730 260H805"/>
  <rect class="green" x="805" y="210" width="225" height="100" rx="6"/>
  <text class="label" x="918" y="245" text-anchor="middle">门控后的 head</text>
  <text class="formula" x="918" y="276" text-anchor="middle">õₜ,ₕ = gₜ,ₕ · oₜ,ₕ</text>
  <path class="line" d="M1030 260H1090"/>
  <rect class="card" x="1090" y="225" width="205" height="70" rx="6"/>
  <text class="label" x="1193" y="255" text-anchor="middle">拼接 + Wᴼ</text>
  <text class="small" x="1193" y="279" text-anchor="middle">写回残差流</text>

  <path class="line" d="M162 295V385H570"/>
  <rect class="amber" x="570" y="350" width="315" height="86" rx="6"/>
  <text class="label" x="728" y="382" text-anchor="middle">查询相关的 Sigmoid Gate</text>
  <text class="formula" x="728" y="414" text-anchor="middle">gₜ,ₕ = σ(wₕᵀxₜ + bₕ) ∈ (0,1)</text>
  <path class="line" d="M728 350V314"/>
  <text class="small" x="922" y="386">同一 head 面对不同 token</text>
  <text class="small" x="922" y="410">可以得到不同门值</text>

  <rect class="card" x="58" y="565" width="390" height="270" rx="6"/>
  <text class="h" x="84" y="605">没有门控时</text>
  <text class="txt" x="84" y="642">softmax 保证注意力权重和为 1，</text>
  <text class="txt" x="84" y="670">所以每个 head 总要读出一个加权平均。</text>
  <text class="txt" x="84" y="710">即使没有值得读取的信息，head 输出</text>
  <text class="txt" x="84" y="738">也不会因为 softmax 自然变成全零。</text>
  <rect class="pink" x="84" y="772" width="338" height="40" rx="6"/>
  <text class="small" x="253" y="797" text-anchor="middle">这与 attention sink、异常激活相关</text>

  <rect class="card" x="505" y="565" width="390" height="270" rx="6"/>
  <text class="h" x="531" y="605">加门控以后</text>
  <text class="txt" x="531" y="642">当 gₜ,ₕ 接近 0，这个 head 对当前</text>
  <text class="txt" x="531" y="670">token 的写回几乎关闭。</text>
  <text class="txt" x="531" y="710">门控增加了一层查询相关非线性，</text>
  <text class="txt" x="531" y="738">抑制无用读取与极端激活传播。</text>
  <rect class="green" x="531" y="772" width="338" height="40" rx="6"/>
  <text class="small" x="700" y="797" text-anchor="middle">参数和计算增量很小，作用点很直接</text>

  <rect x="952" y="565" width="390" height="270" rx="6" fill="#fff" stroke="#0f766e" stroke-width="2"/>
  <text class="h" x="978" y="605">不要混淆</text>
  <text class="txt" x="978" y="642">Attention gate：控制 head 输出强度</text>
  <text class="txt" x="978" y="680">MoE gate：选择执行哪些 FFN 专家</text>
  <text class="txt" x="978" y="718">Forget gate：更新线性注意力状态</text>
  <text class="txt" x="978" y="756">三者都叫 gate，但对象和位置不同。</text>
  <rect class="blue" x="978" y="786" width="338" height="30" rx="6"/>
  <text class="small" x="1147" y="807" text-anchor="middle">Qwen3-Next 同时用到了前两类门控</text>
</svg>
