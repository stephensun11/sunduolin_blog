<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 880" role="img" aria-labelledby="title desc">
  <title id="title">Multi-head Latent Attention 工作原理</title>
  <desc id="desc">对比标准多头注意力与 MLA 的 KV 缓存，展示低秩压缩、解压投影和解耦 RoPE 路径。</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <style>
      .title{font:700 32px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#172033}.sub{font:400 17px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#526174}.h{font:700 22px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#172033}.label{font:700 16px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#172033}.txt{font:400 15px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#415166}.formula{font:500 17px Consolas,'Microsoft YaHei',monospace;fill:#1e3a5f}.box{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.blue{fill:#eff6ff;stroke:#2563eb;stroke-width:1.8}.green{fill:#ecfdf5;stroke:#0f766e;stroke-width:1.8}.amber{fill:#fffbeb;stroke:#b45309;stroke-width:1.8}.line{fill:none;stroke:#64748b;stroke-width:2;marker-end:url(#a)}
    </style>
  </defs>
  <rect width="1400" height="880" fill="#f7fafc"/>
  <text class="title" x="62" y="58">MLA：把每个历史 token 的整套 KV 压成一个潜向量</text>
  <text class="sub" x="62" y="90">关键不是少几个 KV head，而是让多个 head 的 K/V 共同经过低秩瓶颈，并只缓存瓶颈表示</text>

  <rect class="box" x="58" y="130" width="430" height="590" rx="6"/>
  <text class="h" x="84" y="170">标准 MHA / GQA</text>
  <text class="txt" x="84" y="200">每到一个新 token，都把历史 K/V 追加到缓存</text>
  <rect class="blue" x="190" y="240" width="170" height="64" rx="6"/>
  <text class="label" x="254" y="279" text-anchor="middle">隐藏状态 hₜ</text>
  <path class="line" d="M275 304V350"/>
  <rect class="box" x="88" y="350" width="150" height="72" rx="6"/>
  <rect class="box" x="310" y="350" width="150" height="72" rx="6"/>
  <text class="label" x="163" y="380" text-anchor="middle">Wᴷ hₜ</text>
  <text class="txt" x="163" y="404" text-anchor="middle">所有 K head</text>
  <text class="label" x="385" y="380" text-anchor="middle">Wⱽ hₜ</text>
  <text class="txt" x="385" y="404" text-anchor="middle">所有 V head</text>
  <path class="line" d="M163 422V475"/>
  <path class="line" d="M385 422V475"/>
  <rect class="amber" x="88" y="475" width="372" height="110" rx="6"/>
  <text class="label" x="274" y="510" text-anchor="middle">KV Cache / 每个 token</text>
  <text class="formula" x="274" y="543" text-anchor="middle">≈ 2 · nₖᵥ · dₕ 个数</text>
  <text class="txt" x="274" y="570" text-anchor="middle">序列越长，显存线性增长</text>
  <text class="txt" x="84" y="638">GQA 通过减少 nₖᵥ 降低缓存，</text>
  <text class="txt" x="84" y="665">但每个 KV head 仍保存完整向量。</text>

  <rect x="520" y="130" width="822" height="590" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="2"/>
  <text class="h" x="550" y="170">DeepSeek MLA</text>
  <text class="txt" x="550" y="200">内容路径做低秩压缩；位置路径单独携带 RoPE，避开无法吸收入权重的问题</text>
  <rect class="blue" x="825" y="230" width="190" height="62" rx="6"/>
  <text class="label" x="920" y="268" text-anchor="middle">隐藏状态 hₜ</text>

  <path class="line" d="M875 292L710 350"/>
  <path class="line" d="M965 292L1130 350"/>
  <rect class="green" x="590" y="350" width="240" height="82" rx="6"/>
  <text class="label" x="710" y="382" text-anchor="middle">KV 下投影 Wᴰᴷⱽ</text>
  <text class="formula" x="710" y="410" text-anchor="middle">cₜᴷⱽ = Wᴰᴷⱽhₜ</text>
  <rect class="blue" x="1010" y="350" width="240" height="82" rx="6"/>
  <text class="label" x="1130" y="382" text-anchor="middle">Q 下投影 WᴰQ</text>
  <text class="formula" x="1130" y="410" text-anchor="middle">cₜQ = WᴰQhₜ</text>

  <path class="line" d="M650 432L620 505"/>
  <path class="line" d="M770 432L825 505"/>
  <path class="line" d="M1090 432L1005 505"/>
  <rect class="box" x="550" y="505" width="140" height="72" rx="6"/>
  <rect class="box" x="750" y="505" width="140" height="72" rx="6"/>
  <rect class="box" x="935" y="505" width="140" height="72" rx="6"/>
  <text class="label" x="620" y="535" text-anchor="middle">上投影 Kᶜ</text>
  <text class="txt" x="620" y="560" text-anchor="middle">内容 Key</text>
  <text class="label" x="820" y="535" text-anchor="middle">上投影 Vᶜ</text>
  <text class="txt" x="820" y="560" text-anchor="middle">Value</text>
  <text class="label" x="1005" y="535" text-anchor="middle">上投影 Qᶜ</text>
  <text class="txt" x="1005" y="560" text-anchor="middle">内容 Query</text>

  <rect class="amber" x="1120" y="490" width="175" height="103" rx="6"/>
  <text class="label" x="1208" y="522" text-anchor="middle">解耦 RoPE</text>
  <text class="txt" x="1208" y="550" text-anchor="middle">qᴿ 与共享 kᴿ</text>
  <text class="txt" x="1208" y="575" text-anchor="middle">单独编码位置</text>
  <path class="line" d="M1118 541L1075 541"/>

  <rect class="green" x="590" y="620" width="660" height="72" rx="6"/>
  <text class="label" x="920" y="649" text-anchor="middle">真正缓存：cₜᴷⱽ 与较小的 kₜᴿ</text>
  <text class="formula" x="920" y="677" text-anchor="middle">每 token ≈ d_c + d_hᴿ，而不是 2 · nₕ · dₕ</text>

  <rect x="58" y="752" width="1284" height="82" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
  <text class="label" x="82" y="785">为什么 RoPE 要解耦？</text>
  <text class="txt" x="82" y="814">若直接对完整 K 做位置旋转，旋转矩阵随位置变化，K 的上投影矩阵就不能完全“吸收”进 Q 侧；拆出小型位置通道后，内容通道才可只缓存低维潜向量。</text>
</svg>
